<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 뭐 먹지? 🍜</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
      background: linear-gradient(135deg, #e0f7e9 0%, #b9ebc8 50%, #8fd9a8 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 배경 꾸미기 — 몽글몽글한 원들 */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      z-index: 0;
      pointer-events: none;
    }

    /* 메인 카드 등장 */
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .float-in { animation: floatIn 0.6s ease-out both; }

    /* 결과 카드 팝 */
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.85); }
      60%  { opacity: 1; transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .pop-in { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    /* 이모지 슬롯머신 회전 */
    @keyframes slotSpin {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-100%); }
    }
    .slot-spin { animation: slotSpin 0.15s linear infinite; }

    /* 토스트 */
    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    .toast-in { animation: toastIn 0.3s ease-out both; }

    /* 반짝이 */
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.6); }
      50%      { opacity: 1; transform: scale(1.1); }
    }
    .sparkle { animation: sparkle 1.4s ease-in-out infinite; }

    /* 결과 이모지 둥둥 */
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .bob { animation: bob 2.4s ease-in-out infinite; }
  </style>
</head>
<body class="text-zinc-800">

  <!-- 배경 장식 -->
  <div class="blob bg-emerald-300" style="width: 340px; height: 340px; top: -80px; left: -80px;"></div>
  <div class="blob bg-lime-400" style="width: 380px; height: 380px; bottom: -120px; right: -100px;"></div>

  <main class="relative z-10 mx-auto flex min-h-screen max-w-md flex-col items-center justify-center px-6 py-10">

    <!-- 상단 타이틀 -->
    <header class="mb-8 text-center float-in">
      <p class="mb-2 text-sm font-semibold tracking-widest text-pink-600/80">TODAY'S MENU</p>
      <h1 class="text-4xl font-extrabold tracking-tight text-zinc-900 sm:text-5xl">
        오늘 뭐 먹지? <span class="inline-block bob">🍜</span>
      </h1>
      <p class="mt-3 text-base text-zinc-600">
        고민될 땐, 버튼 한 번이면 끝!
      </p>
    </header>

    <!-- 메인 카드 영역 -->
    <section
      id="cardArea"
      class="w-full rounded-3xl bg-white/70 p-8 shadow-xl shadow-pink-200/50 ring-1 ring-white backdrop-blur-md float-in"
    >
      <!-- ===== 1. 초기 상태 ===== -->
      <div id="stateInitial" class="flex flex-col items-center gap-6 py-6">
        <div class="relative">
          <div class="absolute -left-3 -top-3 text-2xl sparkle" style="animation-delay: 0s;">✨</div>
          <div class="absolute -right-3 -bottom-2 text-xl sparkle" style="animation-delay: 0.7s;">💫</div>
          <div class="text-7xl">🍽️</div>
        </div>
        <p class="text-center text-lg font-medium text-zinc-700">
          버튼을 누르면<br/>오늘의 메뉴를 추천해드려요
        </p>
      </div>

      <!-- ===== 2. 로딩 상태 ===== -->
      <div id="stateLoading" class="hidden flex-col items-center gap-6 py-6">
        <div class="relative h-24 w-24 overflow-hidden rounded-2xl bg-gradient-to-br from-orange-100 to-pink-100 ring-1 ring-white">
          <div id="slotReel" class="slot-spin flex flex-col items-center text-6xl leading-[6rem]">
            <!-- 이모지는 JS가 넣어준다 -->
          </div>
        </div>
        <p class="animate-pulse text-center text-lg font-medium text-zinc-700">
          맛있는 메뉴 찾는 중...
        </p>
      </div>

      <!-- ===== 3. 결과 상태 ===== -->
      <div id="stateResult" class="hidden flex-col items-center gap-4 py-4">
        <span
          id="resultCategory"
          class="rounded-full bg-pink-100 px-4 py-1 text-xs font-bold tracking-wider text-pink-600"
        >한식</span>

        <div id="resultEmoji" class="bob text-8xl drop-shadow-md">🍜</div>

        <h2 id="resultName" class="text-3xl font-extrabold tracking-tight text-zinc-900">
          라면
        </h2>

        <p id="resultDesc" class="max-w-xs text-center text-sm leading-relaxed text-zinc-600">
          추운 날의 정답. 김치 한 조각이면 완성.
        </p>

        <!-- 액션 버튼들 -->
        <div class="mt-2 flex w-full gap-3">
          <button
            id="shareBtn"
            class="flex-1 rounded-2xl bg-white py-3 text-sm font-bold text-zinc-700 ring-1 ring-zinc-200 transition-all duration-200 hover:bg-zinc-50 hover:ring-zinc-300 active:scale-95"
          >
            📤 공유하기
          </button>
          <button
            id="retryBtn"
            class="flex-1 rounded-2xl bg-gradient-to-br from-pink-500 to-orange-500 py-3 text-sm font-bold text-white shadow-lg shadow-pink-300/50 transition-all duration-200 hover:brightness-110 active:scale-95"
          >
            🔄 다시 뽑기
          </button>
        </div>
      </div>
    </section>

    <!-- 메인 CTA 버튼 (초기/로딩에서만 노출) -->
    <button
      id="pickBtn"
      class="mt-6 w-full rounded-2xl bg-gradient-to-br from-pink-500 via-rose-500 to-orange-500 py-4 text-lg font-extrabold text-white shadow-xl shadow-pink-400/40 transition-all duration-200 hover:scale-[1.02] hover:brightness-110 active:scale-95 disabled:cursor-not-allowed disabled:opacity-60"
    >
      🎲 오늘 메뉴 뽑기!
    </button>

    <!-- 푸터 -->
    <footer class="mt-8 text-xs text-zinc-500">
      made with 🧡 for hungry minds
    </footer>
  </main>

  <!-- 토스트 -->
  <div
    id="toast"
    class="fixed bottom-10 left-1/2 z-50 hidden -translate-x-1/2 rounded-full bg-zinc-900 px-5 py-3 text-sm font-medium text-white shadow-2xl"
  >
    링크가 복사됐어요! 📋
  </div>

  <script>
    // ===== 1. 데이터 =====
    const menuList = [
      { name: '김치찌개',   emoji: '🍲', category: '한식',   desc: '얼큰한 국물에 밥 한 공기면 완벽한 하루.' },
      { name: '라면',       emoji: '🍜', category: '한식',   desc: '추운 날의 정답. 김치 한 조각이면 완성.' },
      { name: '비빔밥',     emoji: '🥗', category: '한식',   desc: '고추장에 쓱쓱, 건강하게 배부르게.' },
      { name: '삼겹살',     emoji: '🥓', category: '한식',   desc: '지글지글. 오늘 하루 수고한 나에게.' },
      { name: '치킨',       emoji: '🍗', category: '야식',   desc: '행복은 바삭한 튀김옷 속에 있다.' },
      { name: '피자',       emoji: '🍕', category: '양식',   desc: '나눠 먹을수록 맛있는 그 이름.' },
      { name: '파스타',     emoji: '🍝', category: '양식',   desc: '오늘만큼은 우아하게 한 접시.' },
      { name: '햄버거',     emoji: '🍔', category: '양식',   desc: '두툼한 패티 한 입이면 모든 게 괜찮아져요.' },
      { name: '초밥',       emoji: '🍣', category: '일식',   desc: '신선함이 진심인 한 조각.' },
      { name: '우동',       emoji: '🍲', category: '일식',   desc: '뜨끈한 국물에 탱글한 면발.' },
      { name: '돈카츠',     emoji: '🍱', category: '일식',   desc: '바사삭 소리가 이미 맛있음.' },
      { name: '짜장면',     emoji: '🍜', category: '중식',   desc: '고민이 될 땐 역시 검은색.' },
      { name: '짬뽕',       emoji: '🍲', category: '중식',   desc: '해물이 가득, 얼큰함이 듬뿍.' },
      { name: '탕수육',     emoji: '🍱', category: '중식',   desc: '부먹이냐 찍먹이냐, 그것이 문제로다.' },
      { name: '쌀국수',     emoji: '🍜', category: '아시안', desc: '가벼운데 든든한 국물 한 그릇.' },
      { name: '팟타이',     emoji: '🍤', category: '아시안', desc: '달달짭짤, 새콤한 이국의 맛.' },
      { name: '타코',       emoji: '🌮', category: '멕시칸', desc: '한 손에 잡히는 즐거움.' },
      { name: '샐러드',     emoji: '🥙', category: '다이어트', desc: '오늘은 가볍게, 마음도 몸도.' },
      { name: '떡볶이',     emoji: '🌶️', category: '분식',   desc: '빨간 국물에 빠진 오늘의 나.' },
      { name: '김밥',       emoji: '🍙', category: '분식',   desc: '돌돌 말린 완벽한 한 끼.' },
      { name: '순대국',     emoji: '🍲', category: '한식',   desc: '든든함의 아이콘. 속이 뜨끈.' },
      { name: '냉면',       emoji: '🍜', category: '한식',   desc: '시원하게, 한 번에, 쭉.' },
      { name: '마라탕',     emoji: '🌶️', category: '중식',   desc: '얼얼한 게 중독되는 맛.' },
      { name: '돈부리',     emoji: '🍚', category: '일식',   desc: '한 그릇에 담긴 완벽한 밸런스.' },
      { name: '샌드위치',   emoji: '🥪', category: '양식',   desc: '간편하게, 하지만 만족스럽게.' },
    ];

    // ===== 2. 화면 그리기 =====
    const stateInitial  = document.getElementById('stateInitial');
    const stateLoading  = document.getElementById('stateLoading');
    const stateResult   = document.getElementById('stateResult');
    const pickBtn       = document.getElementById('pickBtn');
    const retryBtn      = document.getElementById('retryBtn');
    const shareBtn      = document.getElementById('shareBtn');
    const slotReel      = document.getElementById('slotReel');
    const resultEmoji   = document.getElementById('resultEmoji');
    const resultName    = document.getElementById('resultName');
    const resultDesc    = document.getElementById('resultDesc');
    const resultCategory = document.getElementById('resultCategory');
    const toast         = document.getElementById('toast');

    function showState(name) {
      stateInitial.classList.add('hidden');
      stateLoading.classList.add('hidden');
      stateResult.classList.add('hidden');

      stateInitial.classList.remove('flex');
      stateLoading.classList.remove('flex');
      stateResult.classList.remove('flex');

      const target = { initial: stateInitial, loading: stateLoading, result: stateResult }[name];
      target.classList.remove('hidden');
      target.classList.add('flex');
    }

    function fillSlotReel() {
      // 로딩 중 슬롯머신처럼 돌아갈 이모지 목록
      const emojis = menuList.map(m => m.emoji);
      slotReel.innerHTML = emojis.map(e => `<div>${e}</div>`).join('');
    }

    function renderResult(menu) {
      resultEmoji.textContent    = menu.emoji;
      resultName.textContent     = menu.name;
      resultDesc.textContent     = menu.desc;
      resultCategory.textContent = menu.category;

      // 결과 카드 등장 애니메이션 재시작
      stateResult.classList.remove('pop-in');
      void stateResult.offsetWidth; // reflow trick
      stateResult.classList.add('pop-in');
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.remove('hidden');
      toast.classList.add('toast-in');
      setTimeout(() => {
        toast.classList.add('hidden');
        toast.classList.remove('toast-in');
      }, 1800);
    }

    // ===== 3. 버튼 동작 =====
    function pickRandomMenu() {
      return menuList[Math.floor(Math.random() * menuList.length)];
    }

    function startPick() {
      showState('loading');
      pickBtn.disabled = true;
      pickBtn.textContent = '고르는 중...';

      setTimeout(() => {
        const picked = pickRandomMenu();
        renderResult(picked);
        showState('result');
        pickBtn.classList.add('hidden'); // 결과 화면에서는 메인 버튼 숨김
        pickBtn.disabled = false;
        pickBtn.textContent = '🎲 오늘 메뉴 뽑기!';
      }, 1400);
    }

    function retry() {
      startPick();
    }

    async function share() {
      const text = `오늘의 추천 메뉴는 ${resultEmoji.textContent} ${resultName.textContent}! 당신도 뽑아보세요 👉`;
      try {
        if (navigator.share) {
          await navigator.share({ title: '오늘 뭐 먹지?', text, url: location.href });
        } else {
          await navigator.clipboard.writeText(`${text} ${location.href}`);
          showToast('링크가 복사됐어요! 📋');
        }
      } catch (_) {
        // 공유 취소 등은 조용히 무시
      }
    }

    // 이벤트 바인딩
    pickBtn.addEventListener('click', startPick);
    retryBtn.addEventListener('click', retry);
    shareBtn.addEventListener('click', share);

    // 초기화
    fillSlotReel();
    showState('initial');
  </script>
</body>
</html>
